version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: bloodbank_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: blooddonor

  backend:
    build: ./backend
    container_name: bloodbank_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/blooddonor
      JWT_SECRET: supersecretjwtkey2024changeInProd
      JWT_EXPIRE: 7d
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: bloodbank_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
